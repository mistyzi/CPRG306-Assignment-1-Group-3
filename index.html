<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Converter</title>
    <link rel="icon" href="assets/favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white">

    <header class="pt-8 pb-2 text-center">
        <h1 class="text-4xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-teal-400">
            Unit Converter
        </h1>
    </header>

    <!-- NAVBAR -->
    <nav class="bg-gray-800 p-4 flex gap-6 text-lg font-semibold">
        <button class="tab-btn transition-colors duration-200 hover:text-gray-300" data-tab="weight">Weight</button>
        <button class="tab-btn transition-colors duration-200 hover:text-gray-300" data-tab="distance">Distance</button>
        <button class="tab-btn transition-colors duration-200 hover:text-gray-300" data-tab="temperature">Temperature</button>
    </nav>

    <!-- CONTENT -->
    <div class="p-6">

        <!-- WEIGHT TAB -->
        <div class="tab" id="weight">
            <h2 class="text-2xl mb-4">Weight Converter</h2>

            <div data-form class="space-y-4 bg-gray-800 p-4 rounded">

                <input data-input type="text" class="w-full p-2 bg-gray-700 rounded" placeholder="Enter value or list (e.g., 10, 20, 30)">

                <select data-from class="w-full p-2 bg-gray-700 rounded">
                    <option value="">From unit</option>
                    <option value="pounds">Pounds</option>
                    <option value="kilograms">Kilograms</option>
                </select>

                <select data-to class="w-full p-2 bg-gray-700 rounded">
                    <option value="">To unit</option>
                    <option value="pounds">Pounds</option>
                    <option value="kilograms">Kilograms</option>
                </select>

                <button data-convert class="w-full bg-blue-600 p-2 rounded transition-colors duration-200 hover:bg-blue-500">Convert</button>
                <button data-clear class="w-full bg-red-600 p-2 rounded transition-colors duration-200 hover:bg-red-500">Clear</button>

                <div data-result class="text-xl font-bold mt-4"></div>
            </div>
        </div>

        <!-- DISTANCE TAB -->
        <div class="tab hidden" id="distance">
            <h2 class="text-2xl mb-4">Distance Converter</h2>

            <div data-form class="space-y-4 bg-gray-800 p-4 rounded">

                <input data-input type="text" class="w-full p-2 bg-gray-700 rounded" placeholder="Enter value or list">

                <select data-from class="w-full p-2 bg-gray-700 rounded">
                    <option value="">From unit</option>
                    <option value="miles">Miles</option>
                    <option value="kilometres">Kilometres</option>
                </select>

                <select data-to class="w-full p-2 bg-gray-700 rounded">
                    <option value="">To unit</option>
                    <option value="miles">Miles</option>
                    <option value="kilometres">Kilometres</option>
                </select>

                <button data-convert class="w-full bg-blue-600 p-2 rounded transition-colors duration-200 hover:bg-blue-500">Convert</button>
                <button data-clear class="w-full bg-red-600 p-2 rounded transition-colors duration-200 hover:bg-red-500">Clear</button>

                <div data-result class="text-xl font-bold mt-4"></div>
            </div>
        </div>

        <!-- TEMPERATURE TAB -->
        <div class="tab hidden" id="temperature">
            <h2 class="text-2xl mb-4">Temperature Converter</h2>

            <div data-form class="space-y-4 bg-gray-800 p-4 rounded">

                <input data-input type="text" class="w-full p-2 bg-gray-700 rounded" placeholder="Enter value or list">

                <select data-from class="w-full p-2 bg-gray-700 rounded">
                    <option value="">From unit</option>
                    <option value="celsius">Celsius</option>
                    <option value="fahrenheit">Fahrenheit</option>
                </select>

                <select data-to class="w-full p-2 bg-gray-700 rounded">
                    <option value="">To unit</option>
                    <option value="celsius">Celsius</option>
                    <option value="fahrenheit">Fahrenheit</option>
                </select>

                <button data-convert class="w-full bg-blue-600 p-2 rounded transition-colors duration-200 hover:bg-blue-500">Convert</button>
                <button data-clear class="w-full bg-red-600 p-2 rounded transition-colors duration-200 hover:bg-red-500">Clear</button>

                <div data-result class="text-xl font-bold mt-4"></div>
            </div>
        </div>

    </div>

    <script type="module" src="js/app.js"></script>

    <script>
        // Tab switching
        const buttons = document.querySelectorAll(".tab-btn");
        const tabs = document.querySelectorAll(".tab");

        buttons.forEach(btn => {
            btn.addEventListener("click", () => {
                tabs.forEach(t => t.classList.add("hidden"));
                document.getElementById(btn.dataset.tab).classList.remove("hidden");
            });
        });
    </script>

</body>
</html>
